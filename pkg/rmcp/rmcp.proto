syntax = "proto3";
option go_package = "pkg/rmcp;rmcp"; //RoboMaster Client Protocol
// KeyboardMouseControl - 传输鼠标键盘输入 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:75Hz
message KeyboardMouseControl {
    int32 mouse_x = 1;              // 鼠标x轴移动速度，负值标识向左移动
    int32 mouse_y = 2;              // 鼠标y轴移动速度，负值标识向下移动
    int32 mouse_z = 3;              // 鼠标滚轮移动速度，负值标识向后滚动
    bool left_button_down = 4;      // 左键是否按下 (false=抬起, true=按下)
    bool right_button_down = 5;     // 右键是否按下 (false=抬起, true=按下)
    uint32 keyboard_value = 6;      // 键盘按键位掩码
    bool mid_button_down = 7;       // 中键是否按下 (false=抬起, true=按下)
}

// CustomControl - 传输自定义数据 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:75Hz
message CustomControl {
    bytes data = 1;                 // 最大30字节的自定义数据
}

// GameStatus - 同步比赛全局状态信息 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:5Hz
message GameStatus {
    uint32 current_round = 1;       // 当前局号（从1开始）
    uint32 total_rounds = 2;        // 总局数
    uint32 red_score = 3;           // 红方得分
    uint32 blue_score = 4;          // 蓝方得分
    uint32 current_stage = 5;       // 当前阶段 (0:未开始 1:准备阶段 2:十五秒裁判系统自检 3:五秒倒计时 4:比赛中 5:比赛结算中)
    int32 stage_countdown_sec = 6;  // 当前阶段剩余时间（秒）
    int32 stage_elapsed_sec = 7;    // 当前阶段已过时间（秒）
    bool is_paused = 8;             // 是否暂停
}

// GlobalUnitStatus - 同步基地、前哨站和所有机器人状态 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message GlobalUnitStatus {
    uint32 base_health = 1;         // 基地当前血量（0=已摧毁）
    uint32 base_status = 2;         // 基地状态 (0:无敌 1:解除无敌,护甲未展开 2:解除无敌,护甲展开)
    uint32 base_shield = 3;         // 基地当前护盾值（0=无护盾）
    uint32 outpost_health = 4;      // 前哨站当前血量（0=已摧毁）
    uint32 outpost_status = 5;      // 前哨站状态 (0:无敌 1:存活,解除无敌,中部装甲旋转 2:存活,解除无敌,中部装甲停转 3:被击毁,不可重建 4:被击毁,可重建 5:被击毁,重建中)
    repeated uint32 robot_health = 6;      // 所有机器人血量（先己方后对方）
    repeated int32 robot_bullets = 7;      // 己方机器人剩余累计发弹量
    uint32 total_damage_red = 8;    // 己方累计总伤害
    uint32 total_damage_blue = 9;   // 对方累计总伤害
    uint32 enemy_base_health = 10;  // 敌方基地当前血量（0=已摧毁）
    uint32 enemy_base_status = 11;  // 敌方基地状态 (0:无敌 1:解除无敌,护甲未展开 2:解除无敌,护甲展开)
    uint32 enemy_base_shield = 12;  // 敌方基地当前护盾值（0=无护盾）
    uint32 enemy_outpost_health = 13; // 敌方前哨站当前血量（0=已摧毁）
    uint32 enemy_outpost_status = 14; // 敌方前哨站状态 (0:无敌 1:存活,解除无敌,中部装甲旋转 2:存活,解除无敌,中部装甲停转 3:被击毁,不可重建 4:被击毁,可重建 5:被击毁,重建中)
    uint32 total_damage_enemy = 15; // 敌方累计总伤害
}

// GlobalLogisticsStatus - 同步全局后勤信息 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message GlobalLogisticsStatus {
    uint32 remaining_economy = 1;   // 己方当前经济
    uint64 total_economy_obtained = 2;  // 己方累计总经济
    uint32 tech_level = 3;          // 己方科技等级（工程机器人曾装配最高难度）
    uint32 encryption_level = 4;    // 己方加密等级（雷达解析信息波机制）
}

// GlobalSpecialMechanism - 同步正在生效的全局特殊机制 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message GlobalSpecialMechanism {
    repeated uint32 mechanism_id = 1;       // 正在生效的机制ID列表 (1:己方堡垒被对方占领计时 2:对方堡垒被己方占领计时)
    repeated int32 mechanism_time_sec = 2;  // 对应的时间参数（秒）
}

// Event - 全局事件通知 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:触发式发送
message Event {
    int32 event_id = 1;     // 事件编号 (1:击杀 2:基地/前哨站被摧毁 3:能量机关可激活次数变化 4:能量单元当前可进入正在激活状态 5:能量机关激活成功灯臂数量/平均环数 6:能量机关被激活 7:己方英雄进入部署模式 8:己方英雄造成狙击伤害 9:对方英雄造成狙击伤害 10:己方呼叫空中支援 11:己方空中支援被打断 12:对方呼叫空中支援 13:对方空中支援被打断 14:飞镖命中 15:双方飞镖闸门开启 16:己方基地遭到攻击 17:双方前哨站停转 18:双方基地护甲展开)
    string param = 2;       // 事件参数（含义随event_id变化）
}

// RobotInjuryStat - 机器人一次存活期间累计受伤统计 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotInjuryStat {
    uint32 total_damage = 1;            // 该次存活累计受伤总计
    uint32 collision_damage = 2;        // 撞击伤害
    uint32 small_projectile_damage = 3; // 17mm弹丸伤害
    uint32 large_projectile_damage = 4; // 42mm弹丸伤害
    uint32 dart_splash_damage = 5;      // 飞镖溅射伤害
    uint32 module_offline_damage = 6;   // 模块离线扣血
    uint32 wifi_offline_damage = 7;     // WiFi离线扣血
    uint32 penalty_damage = 8;          // 判罚扣血
    uint32 server_kill_damage = 9;      // 服务器强制使其战亡扣血
    uint32 killer_id = 10;              // 击杀者ID（若未检测到击杀者，值为0）
}

// RobotRespawnStatus - 机器人复活状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotRespawnStatus {
    bool is_pending_respawn = 1;        // 是否处于待复活状态
    uint32 total_respawn_progress = 2;  // 复活所需总读条
    uint32 current_respawn_progress = 3;// 当前复活读条进度
    bool can_free_respawn = 4;          // 是否可以免费复活
    uint32 gold_cost_for_respawn = 5;   // 花费金币复活所需金币数
    bool can_pay_for_respawn = 6;       // 是否允许花费金币复活
}

// RobotStaticStatus - 机器人固定属性和配置 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotStaticStatus {
    uint32 connection_state = 1;            // 连接状态 (0=未连接, 1=已连接)
    uint32 field_state = 2;                 // 上场状态 (0=已上场, 1=未上场)
    uint32 alive_state = 3;                 // 存活状态 (0=未知, 1=存活, 2=战亡)
    uint32 robot_id = 4;                    // 机器人编号
    uint32 robot_type = 5;                  // 机器人类型
    uint32 performance_system_shooter = 6;  // 性能体系-发射机构 (1:冷却优先 2:爆发优先 3:英雄近战优先 4:英雄远程优先)
    uint32 performance_system_chassis = 7;  // 性能体系-底盘 (1:血量优先 2:功率优先 3:英雄近战优先 4:英雄远程优先)
    uint32 level = 8;                       // 当前等级
    uint32 max_health = 9;                  // 最大血量
    uint32 max_heat = 10;                   // 最大热量
    float heat_cooldown_rate = 11;          // 热量冷却速率（每秒）
    uint32 max_power = 12;                  // 最大功率
    uint32 max_buffer_energy = 13;          // 最大缓冲能量
    uint32 max_chassis_energy = 14;         // 最大底盘能量
}

// RobotDynamicStatus - 机器人实时数据 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:10Hz
message RobotDynamicStatus {
    uint32 current_health = 1;              // 当前血量
    float current_heat = 2;                 // 当前热量
    float last_projectile_fire_rate = 3;    // 上一次弹丸射速
    uint32 current_chassis_energy = 4;      // 当前剩余底盘能量
    uint32 current_buffer_energy = 5;       // 当前缓冲能量
    uint32 current_experience = 6;          // 当前经验值
    uint32 experience_for_upgrade = 7;      // 升级所需经验
    uint32 total_projectiles_fired = 8;     // 累计已发弹量
    uint32 remaining_ammo = 9;              // 剩余允许发弹量
    bool is_out_of_combat = 10;             // 是否处于脱战状态
    uint32 out_of_combat_countdown = 11;    // 脱战状态倒计时
    bool can_remote_heal = 12;              // 是否可以远程补血
    bool can_remote_ammo = 13;              // 是否可以远程补弹
}

// RobotModuleStatus - 机器人各模块运行状态 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotModuleStatus {
    uint32 power_manager = 1;       // 电源管理模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 rfid = 2;                // RFID模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 light_strip = 3;         // 灯条模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 small_shooter = 4;       // 17mm发射机构状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 big_shooter = 5;         // 42mm发射机构状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 uwb = 6;                 // 定位模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 armor = 7;               // 装甲模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 video_transmission = 8;  // 图传模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 capacitor = 9;           // 电容模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 main_controller = 10;    // 主控状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
    uint32 laser_detection_module = 11; // 激光检测模块状态 (0=离线, 1=在线, 2=因安装不规范被视为离线)
}

// RobotPosition - 机器人空间坐标和朝向 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotPosition {
    float x = 1;    // 世界坐标X轴
    float y = 2;    // 世界坐标Y轴
    float z = 3;    // 世界坐标Z轴
    float yaw = 4;  // 本机器人测速模块的朝向，单位：度，正北为0度
}

// Buff - Buff效果信息 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:获得增益时触发发送,此后1Hz定频发送直到失去增益
message Buff {
    uint32 robot_id = 1;        // 机器人ID
    uint32 buff_type = 2;       // Buff类型 (1:攻击增益 2:防御增益 3:射击热量冷却增益 4:底盘功率增益 5:回血增益 6:可兑换允许发弹量 7:地形跨越增益(预备))
    int32 buff_level = 3;       // Buff增益值
    uint32 buff_max_time = 4;   // Buff最大剩余时间
    uint32 buff_left_time = 5;  // Buff剩余时间
    string msg_params = 6;      // 额外文字参数
}

// PenaltyInfo - 判罚信息同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:触发式发送
message PenaltyInfo {
    uint32 penalty_type = 1;        // 当前受罚类型 (1:黄牌 2:双方黄牌 3:红牌 4:超功率 5:超热量 6:超射速)
    uint32 penalty_effect_sec = 2;  // 当前受罚效果时长（秒）
    uint32 total_penalty_num = 3;   // 当前判罚数量
}

// RobotPathPlanInfo - 哨兵轨迹规划信息 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotPathPlanInfo {
    uint32 intention = 1;           // 哨兵意图 (1=攻击, 2=防守, 3=移动)
    uint32 start_pos_x = 2;         // 起始点X坐标（分米）
    uint32 start_pos_y = 3;         // 起始点Y坐标（分米）
    repeated int32 offset_x = 4;    // 相对起始点X增量数组（-128~+127, 长度49）
    repeated int32 offset_y = 5;    // 相对起始点Y增量数组（-128~+127, 长度49）
    uint32 sender_id = 6;           // 发送者ID
}

// MapClickInfoNotify - 云台手地图点击标记 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:触发式发送
message MapClickInfoNotify {
    uint32 is_send_all = 1;     // 发送范围 (0=指定客户端, 1=除哨兵, 2=包含哨兵)
    bytes robot_id = 2;         // 目标机器人ID列表（固定7字节）
    uint32 mode = 3;            // 标记类型 (1=攻击, 2=防御, 3=警戒, 4=自定义)
    uint32 enemy_id = 4;        // 标定的对方ID
    uint32 ascii = 5;           // 自定义图标ASCII码
    uint32 type = 6;            // 标记模式 (1=地图, 2=对方机器人)
    uint32 screen_x = 7;        // 屏幕坐标X（像素）
    uint32 screen_y = 8;        // 屏幕坐标Y（像素）
    float map_x = 9;            // 地图坐标X
    float map_y = 10;           // 地图坐标Y
}

// RaderInfoToClient - 雷达发送的机器人位置信息 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RaderInfoToClient {
    uint32 target_robot_id = 1;     // 目标机器人ID
    float target_pos_x = 2;         // 目标位置X（米）
    float target_pos_y = 3;         // 目标位置Y（米）
    float torward_angle = 4;        // 朝向角度
    uint32 is_high_light = 5;       // 是否特殊标识 (0=否, 1=是, 2=是，但目标机器人此时定位模块为离线状态)
}

// CustomByteBlock - 机器人自定义上传数据流(机器人端对应0x0310) | 机器人→图传链路→自定义客户端 | 最高qos等级:1 | 频率:50Hz
message CustomByteBlock {
    bytes data = 1;     // 最大为2.4kbit的自定义数据包
}

// AssemblyCommand - 工程装配指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message AssemblyCommand {
    uint32 operation = 1;   // 装配操作类型 (1=确认装配, 2=取消装配)
    uint32 difficulty = 2;  // 选中的装配难度
}

// CommonCommand - 机器人多种常用指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message CommonCommand {
    uint32 cmd_type = 1;    // 命令类型 (1=兑换17mm发弹量, 2=兑换42mm发弹量)
    uint32 param = 2;       // 命令类型对应的参数
}

// TechCoreMotionStateSync - 科技核心运动状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message TechCoreMotionStateSync {
    uint32 maximum_difficulty_level = 1;    // 当前可选择的最高装配难度等级
    uint32 status = 2;                      // 科技核心状态 (1:未进入装配状态 2:已选择装配难度,科技核心移动中 3:科技核心移动完成,可进行首个装配步骤 4:上一个装配步骤已完成,可进行下一个装配步骤 5:装配步骤已全部完成 6:已确认装配,科技核心移动中)
    uint32 enemy_core_status = 3;           // 敌方科技核心状态
    uint32 remain_time_all = 4;             // 剩余总时间（秒）
    uint32 remain_time_step = 5;            // 当前步骤剩余时间（秒）
}

// RobotPerformanceSelectionCommand - 步兵/英雄选择性能体系 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message RobotPerformanceSelectionCommand {
    uint32 shooter = 1;     // 发射机构性能体系
    uint32 chassis = 2;     // 底盘性能体系
    uint32 sentry_control = 3; // 哨兵控制方式选择 (0=哨兵自动控制, 1=哨兵半自动控制)
}

// RobotPerformanceSelectionSync - 步兵/英雄性能体系状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RobotPerformanceSelectionSync {
    uint32 shooter = 1;     // 发射机构性能体系
    uint32 chassis = 2;     // 底盘性能体系
}

// HeroDeployModeEventCommand - 英雄部署模式相关指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message HeroDeployModeEventCommand {
    uint32 mode = 1;    // 模式 (0=退出, 1=进入)
}

// DeployModeStatusSync - 英雄部署模式状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message DeployModeStatusSync {
    uint32 status = 1;  // 当前部署模式状态 (0=未部署, 1=已部署)
}

// RuneActivateCommand - 能量机关激活指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message RuneActivateCommand {
    uint32 activate = 1;    // 激活 (1=开启)
}

// RuneStatusSync - 能量机关状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message RuneStatusSync {
    uint32 rune_status = 1;     // 当前能量机关状态枚举 (1:未激活 2:正在激活 3:已激活)
    uint32 activated_arms = 2;  // 当前已激活的灯臂数量
    uint32 average_rings = 3;   // 总环数
}

// SentinelStatusSync - 哨兵姿态相关信息同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message SentinelStatusSync {
    uint32 posture_id = 1;  // 姿态ID (1=进攻姿态, 2=防御姿态, 3=移动姿态)
    bool is_weakened = 2;   // 是否弱化
}

// DartCommand - 飞镖控制指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message DartCommand {
    uint32 target_id = 1;   // 目标ID (1=前哨站, 2=基地固定目标, 3=基地随机固定目标, 4=基地随机移动目标, 5=基地末端移动目标)
    bool open = 2;          // 闸门开关
    bool launch_confirm = 3; // 发射确认
}

// DartSelectTargetStatusSync - 飞镖目标选择状态同步 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message DartSelectTargetStatusSync {
    uint32 target_id = 1;   // 目标ID
    bool open = 2;          // 闸门状态
}

// SentryCtrlCommand - 哨兵控制指令请求 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message SentryCtrlCommand {
    uint32 command_id = 1;  // 指令编号 (0=无效, 1:补血点补弹 2:补给站实体补弹 3:远程补弹 4:远程回血 5:确认复活 6:确认花费金币复活 7:地图标点 8:切换为进攻姿态 9:切换为防御姿态 10:切换为移动姿态)
}

// SentryCtrlResult - 哨兵控制指令结果反馈 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message SentryCtrlResult {
    uint32 command_id = 1;  // 对应的指令编号
    uint32 result_code = 2; // 执行结果码 (0:成功, 其他:失败)
}

// AirSupportCommand - 空中支援指令 | 自定义客户端→服务器 | 最高qos等级:1 | 频率:1Hz
message AirSupportCommand {
    uint32 command_id = 1;  // 指令类型 (1:免费呼叫空中支援 2:花费金币呼叫空中支援(仍优先使用免费时长) 3:中断空中支援)
}

// AirSupportStatusSync - 空中支援状态反馈 | 服务器→自定义客户端 | 最高qos等级:1 | 频率:1Hz
message AirSupportStatusSync {
    uint32 airsupport_status = 1;   // 空中支援状态 (0:未进行空中支援 1:正在空中支援 2:空中支援被对方锁定而无法开启)
    uint32 left_time = 2;           // 免费空中支援剩余时间
    uint32 cost_coins = 3;          // 付费空中支援已花费金币
    bool is_being_targeted = 4;     // 是否被敌方锁定
    uint32 shooter_status = 5;      // 射手状态
}